<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador IOEPA - Local</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilização Customizada -->
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-title {
            color: #0d6efd;
            font-weight: 700;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .progress {
            height: 25px;
            display: none;
        }
        #resultsTable {
            display: none;
        }
        .badge-count {
            font-size: 1.1em;
        }
        .folder-picker-wrap {
            border: 2px dashed #0d6efd;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            background-color: #f1f7ff;
            transition: background-color 0.3s;
        }
        .folder-picker-wrap:hover {
            background-color: #e2efff;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <div class="text-center mb-4">
                <h2 class="header-title">Buscador IOEPA - Arquivos Locais</h2>
                <p class="text-muted">Busca automática no diretório <code>textos_ocr</code></p>
            </div>

            <div class="alert alert-info" id="statusPasta">
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                <strong>Lendo diretório...</strong> Verificando arquivos disponíveis em <code>textos_ocr/</code>.
            </div>

            <!-- PASSO 1: Filtros de Busca -->
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">1. Filtros de Busca</h5>
                </div>
                <div class="card-body">
                    <form id="searchForm">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="nome" class="form-label">Nome Completo/Trecho <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nome" required placeholder="Ex: IAN MATEUS ALVES">
                            </div>
                            <div class="col-md-4">
                                <label for="cpf" class="form-label">CPF (Opcional)</label>
                                <input type="text" class="form-control" id="cpf" placeholder="Apenas números">
                            </div>
                            
                            <div class="col-md-4">
                                <label for="dia" class="form-label">Dia (Opcional)</label>
                                <input type="number" class="form-control" id="dia" min="1" max="31" placeholder="DD">
                            </div>
                            <div class="col-md-4">
                                <label for="mes" class="form-label">Mês (Opcional)</label>
                                <input type="number" class="form-control" id="mes" min="1" max="12" placeholder="MM">
                            </div>
                            <div class="col-md-4">
                                <label for="ano" class="form-label">Ano (Opcional)</label>
                                <input type="number" class="form-control" id="ano" min="1900" max="2100" placeholder="YYYY">
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-lg" id="btnBuscar" disabled>
                                Iniciar Busca
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Progresso -->
            <div class="progress mb-4" id="searchProgress">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" id="progressBar">0%</div>
            </div>

            <!-- PASSO 3: Resultados -->
            <div class="card" id="resultsCard" style="display: none;">
                <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Resultados da Busca</h5>
                    <span class="badge bg-light text-dark badge-count" id="resultCount">0 encontrados</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0" id="resultsTable">
                            <thead class="table-light">
                                <tr>
                                    <th>Data Publicação</th>
                                    <th>Arquivo</th>
                                    <th>Origem</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                <!-- Resultados aparecerão aqui -->
                            </tbody>
                        </table>
                    </div>
                    <div id="noResultsMsg" class="p-4 text-center text-muted" style="display: none;">
                        Nenhuma ocorrência encontrada para os parâmetros informados.
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- jQuery e Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script do Buscador -->
<script>
    let arquivosExistentes = [];

    // ==========================================
    // FUNÇÕES DE NORMALIZAÇÃO (Equivalentes ao Python)
    // ==========================================
    function normalizarTexto(texto) {
        if (!texto) return "";
        texto = texto.toLowerCase();
        // Remove acentos (opcional no python original se for só ascii, mas recomendado)
        texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        // Remove tudo que não for letra, número ou espaço
        texto = texto.replace(/[^a-z0-9\s]/g, '');
        // Troca múltiplos espaços por um só e remove espaços das pontas
        return texto.replace(/\s+/g, ' ').trim();
    }

    function normalizarCpf(cpf) {
        if (!cpf) return "";
        return cpf.replace(/\D/g, '');
    }

    // Filtra apenas os arquivos que SABEMOS que existem na pasta
    function filtrarArquivosAlvo(ano, mes, dia) {
        return arquivosExistentes.filter(arquivo => {
            // arquivo ex: 1980.03.15_ocr.txt
            const partes = arquivo.split('_')[0].split('.'); 
            if (partes.length < 3) return false;
            
            const fAno = partes[0];
            const fMes = partes[1];
            const fDia = partes[2];
            
            // Verifica se a data do arquivo bate com os filtros preenchidos
            if (ano && fAno !== ano) return false;
            if (mes && fMes !== mes.padStart(2, '0')) return false;
            if (dia && fDia !== dia.padStart(2, '0')) return false;
            
            return true;
        });
    }

    // ==========================================
    // EVENTOS DA INTERFACE (jQuery)
    // ==========================================
    $(document).ready(async function() {
        
        // --- NOVO: Lê o conteúdo da pasta ao carregar a página ---
        try {
            const response = await fetch('textos_ocr/');
            if (!response.ok) throw new Error("Status HTTP " + response.status);
            
            const html = await response.text();
            
            // Usa o DOMParser para ler o HTML gerado pelo servidor local e extrair os arquivos
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const links = Array.from(doc.querySelectorAll('a'));
            
            links.forEach(link => {
                let href = decodeURIComponent(link.getAttribute('href'));
                let fileName = href.split('/').pop(); // Pega só o nome do arquivo
                if (fileName && fileName.endsWith('_ocr.txt')) {
                    arquivosExistentes.push(fileName);
                }
            });

            // Remove duplicatas por precaução
            arquivosExistentes = [...new Set(arquivosExistentes)];

            if (arquivosExistentes.length > 0) {
                $('#statusPasta').removeClass('alert-info').addClass('alert-success').html(
                    `<strong>Sucesso!</strong> Foram encontrados <b>${arquivosExistentes.length}</b> arquivos para busca no diretório.`
                );
                $('#btnBuscar').prop('disabled', false);
            } else {
                throw new Error("Pasta vazia ou sem arquivos .txt");
            }

        } catch (error) {
            console.error(error);
            $('#statusPasta').removeClass('alert-info').addClass('alert-warning').html(
                `<strong>Atenção!</strong> Não foi possível listar a pasta <code>textos_ocr/</code>.<br>
                Certifique-se de estar rodando isso em um servidor local (ex: <code>python -m http.server</code>) e que a pasta contém os arquivos txt.`
            );
        }

        // Quando envia o formulário de busca
        $('#searchForm').on('submit', async function(e) {
            e.preventDefault();
            $('#statusPasta').hide();
            
            const nomeRaw = $('#nome').val();
            const cpfRaw = $('#cpf').val();
            const anoRaw = $('#ano').val();
            const mesRaw = $('#mes').val();
            const diaRaw = $('#dia').val();

            const nomeNorm = normalizarTexto(nomeRaw);
            const cpfNorm = normalizarCpf(cpfRaw);

            // Coleta apenas os arquivos correspondentes que realmente existem
            const arquivosAlvo = filtrarArquivosAlvo(anoRaw, mesRaw, diaRaw);

            // Prepara UI para busca
            $('#resultsCard').show();
            $('#resultsTable').hide();
            $('#noResultsMsg').hide();
            $('#resultsBody').empty();
            $('#resultCount').text('0 encontrados');
            
            // Se nenhum arquivo na pasta bate com os filtros de data
            if (arquivosAlvo.length === 0) {
                $('#noResultsMsg').html('Não existe nenhum arquivo no diretório para esta data específica.').show();
                return;
            }

            $('#searchProgress').show();
            $('#progressBar').css('width', '0%').text('0%');
            $('#btnBuscar').prop('disabled', true).text('Buscando...');

            let resultados = [];
            const batchSize = 50; 
            let processados = 0;

            // Processamento Assíncrono para ler os conteúdos
            for (let i = 0; i < arquivosAlvo.length; i += batchSize) {
                const lote = arquivosAlvo.slice(i, i + batchSize);
                
                const promessas = lote.map(async (fileName) => {
                    try {
                        const response = await fetch(`textos_ocr/${fileName}`);
                        if (!response.ok) return null; 
                        
                        const text = await response.text();
                        const conteudoNorm = normalizarTexto(text);
                        
                        let achouNome = conteudoNorm.includes(nomeNorm);
                        let achouCpf = cpfNorm === "" ? true : conteudoNorm.includes(cpfNorm);

                        if (achouNome && achouCpf) {
                            let p = fileName.split('.');
                            let diaLimpo = p[2].split('_')[0];
                            return {
                                data: `${diaLimpo}/${p[1]}/${p[0]}`,
                                arquivo: fileName,
                                origem: 'Local'
                            };
                        }
                    } catch (err) {
                        return null;
                    }
                    return null;
                });

                const resLote = await Promise.all(promessas);
                resultados.push(...resLote.filter(r => r !== null));

                processados += lote.length;
                let pct = Math.round((processados / arquivosAlvo.length) * 100);
                $('#progressBar').css('width', pct + '%').text(pct + '%');
            }

            // Exibe Resultados
            $('#searchProgress').hide();
            $('#btnBuscar').prop('disabled', false).text('Iniciar Busca');
            $('#resultCount').text(`${resultados.length} encontrados`);

            if (resultados.length > 0) {
                $('#resultsTable').show();
                resultados.forEach(res => {
                    $('#resultsBody').append(`
                        <tr>
                            <td><strong>${res.data}</strong></td>
                            <td class="text-muted">${res.arquivo}</td>
                            <td><span class="badge bg-primary">${res.origem}</span></td>
                        </tr>
                    `);
                });
            } else {
                $('#noResultsMsg').html('Nenhuma ocorrência encontrada para os parâmetros informados.').show();
            }
        });
    });
</script>

</body>
</html>
